services:
  - type: web
    name: takeover-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CORS_ORIGINS
        value: "*" # You should restrict this to your Vercel URL in production
      - key: JWT_SECRET
        generateValue: true
      # Add other environment variables (like GOOGLE_CLIENT_ID) in the Render dashboard
